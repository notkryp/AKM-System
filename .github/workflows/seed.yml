name: Seed Database

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      confirm:
        description: 'Type SEED to confirm (destructive action)'
        required: true
        type: string

jobs:
  seed:
    name: Run seed script
    runs-on: ubuntu-latest
    # Safety gate — only run if user typed SEED
    if: ${{ github.event.inputs.confirm == 'SEED' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Run seed script
        working-directory: server
        run: npm run seed
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SEED_ENV: ${{ github.event.inputs.environment }}

      - name: Confirm seed complete
        run: echo "✅ Seed completed for environment: ${{ github.event.inputs.environment }}"
