name: Deploy

on:
  push:
    branches: [main]

jobs:
  notify-render:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Render deploy hook
        if: ${{ secrets.RENDER_DEPLOY_HOOK != '' }}
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" \
            -H 'Content-Type: application/json' \
            --fail --silent --show-error
        continue-on-error: true

      - name: Deploy status
        run: echo "Backend deploy triggered on Render via webhook"

  notify-netlify:
    name: Trigger Netlify Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Netlify build hook
        if: ${{ secrets.NETLIFY_BUILD_HOOK != '' }}
        run: |
          curl -X POST "${{ secrets.NETLIFY_BUILD_HOOK }}" \
            --fail --silent --show-error
        continue-on-error: true

      - name: Deploy status
        run: echo "Frontend deploy triggered on Netlify via webhook"
