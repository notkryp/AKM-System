name: CI

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  # ──────────────────── Backend ────────────────────
  backend:
    name: Backend — lint & build check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Run unit tests (skip if no secrets)
        run: npm test --if-present
        continue-on-error: true
        env:
          NODE_ENV: test
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

  # ──────────────────── Frontend ───────────────────
  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: client/dist
          retention-days: 3

  # ──────────────────── Lighthouse CI ──────────────
  # Runs on PRs targeting main or direct pushes to main
  # Maintained by: Kritik (DevOps Lead)
  lighthouse:
    name: Lighthouse CI — score gate ≥90
    runs-on: ubuntu-latest
    needs: frontend
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build client
        working-directory: client
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Run Lighthouse CI
        run: lhci autorun
        continue-on-error: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  # ──────────────────── Playwright E2E ─────────────
  # Runs on PRs targeting main or direct pushes to main
  # Tests: reserve flow, cancel flow
  # Test account: e2e-test@akmbooks.dev (dedicated CI user)
  # Maintained by: Kritik (DevOps Lead)
  e2e:
    name: Playwright E2E tests
    runs-on: ubuntu-latest
    needs: frontend
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install client deps
        working-directory: client
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start dev server
        working-directory: client
        run: npm run dev &
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Wait for dev server
        run: npx wait-on http://localhost:5173 --timeout 60000

      - name: Run E2E tests
        run: npx playwright test --config=e2e/playwright.config.js
        continue-on-error: true
        env:
          BASE_URL: http://localhost:5173
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASS: ${{ secrets.E2E_PASS }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
