services:
  - type: web
    name: akm-server
    env: node
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    rootDir: server
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: PORT
        value: 5000
