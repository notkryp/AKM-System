# AKM Book Reservation — Local Development Stack
# Author: Kritik (KRIITIIK) — DevOps
#
# Usage:
#   cp .env.example .env        # fill in your Supabase keys
#   docker compose up --build
#
# Services:
#   - server  : Express API on :5000
#   - client  : Vite dev server on :5173

version: '3.9'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - '5000:5000'
    env_file: .env
    environment:
      - NODE_ENV=development
    volumes:
      - ./server:/app
      - /app/node_modules
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5000/health']
      interval: 30s
      timeout: 10s
      retries: 3

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    ports:
      - '5173:5173'
    env_file: .env
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - server
    restart: unless-stopped
