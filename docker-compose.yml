version: '3.9'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: akm-server
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=development
      - PORT=5000
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - CLIENT_URL=http://localhost:5173
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:5000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    image: node:20-alpine
    container_name: akm-client
    restart: unless-stopped
    working_dir: /app
    ports:
      - '5173:5173'
    environment:
      - VITE_API_URL=http://localhost:5000
    command: sh -c 'npm install && npm run dev -- --host'
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      server:
        condition: service_healthy

networks:
  default:
    name: akm-network
